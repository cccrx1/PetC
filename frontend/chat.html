<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天助手 - AI宠物健康管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"></path>
                </svg>
                <h1 class="text-xl font-bold text-gray-800">AI宠物健康管理系统</h1>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">首页</a>
                <a href="pets.html" class="text-gray-700 hover:text-blue-600 font-medium">我的宠物</a>
                <a href="consultation.html" class="text-gray-700 hover:text-blue-600 font-medium">咨询</a>
                <a href="profile.html" class="text-gray-700 hover:text-blue-600 font-medium">我的</a>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="md:hidden text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">聊天助手</h2>
        </div>

        <!-- 聊天界面 -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="p-4 border-b border-gray-200">
                <div class="flex items-center">
                    <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center mr-3">
                        <svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <div>
                        <h3 class="font-medium text-gray-800">宠物健康助手</h3>
                        <p class="text-xs text-gray-500">在线</p>
                    </div>
                </div>
            </div>
            <div id="chat-messages" class="p-4 h-96 overflow-y-auto space-y-4">
                <!-- 系统消息 -->
                <div class="flex justify-center">
                    <span class="bg-gray-100 text-gray-500 text-xs px-3 py-1 rounded-full">今天 10:00</span>
                </div>
                <!-- AI消息 -->
                <div class="flex items-start">
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3 flex-shrink-0">
                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">你好！我是你的宠物健康助手，有什么可以帮助你的吗？</p>
                    </div>
                </div>
                <!-- 用户消息 -->
                <div class="flex items-start justify-end">
                    <div class="bg-blue-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">我的金毛最近食欲下降，怎么办？</p>
                    </div>
                    <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center ml-3 flex-shrink-0">
                        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                </div>
                <!-- AI消息 -->
                <div class="flex items-start">
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3 flex-shrink-0">
                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">金毛食欲下降可能有多种原因，如：</p>
                        <p class="text-gray-800 mt-1">1. 健康问题：消化问题、口腔疾病等</p>
                        <p class="text-gray-800">2. 饮食问题：食物单一、变质等</p>
                        <p class="text-gray-800">3. 环境变化：压力、气候变化等</p>
                        <p class="text-gray-800 mt-1">建议：</p>
                        <p class="text-gray-800">- 检查食物是否新鲜</p>
                        <p class="text-gray-800">- 观察宠物是否有其他症状</p>
                        <p class="text-gray-800">- 如果持续不改善，建议咨询兽医</p>
                    </div>
                </div>
            </div>
            <!-- 快捷提问 -->
            <div class="p-4 border-t border-gray-200 bg-gray-50">
                <div class="flex flex-wrap gap-2">
                    <button class="bg-white border border-gray-200 rounded-full px-3 py-1 text-sm text-gray-700 hover:bg-gray-100">我的宠物需要接种哪些疫苗？</button>
                    <button class="bg-white border border-gray-200 rounded-full px-3 py-1 text-sm text-gray-700 hover:bg-gray-100">如何给宠物洗澡？</button>
                    <button class="bg-white border border-gray-200 rounded-full px-3 py-1 text-sm text-gray-700 hover:bg-gray-100">宠物肥胖怎么办？</button>
                </div>
            </div>
            <!-- 输入框 -->
            <div class="p-4 border-t border-gray-200">
                <div class="flex items-center space-x-2">
                    <button class="text-gray-500 hover:text-blue-600">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </button>
                    <input type="text" id="chat-input" class="flex-1 px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入您的问题...">
                    <button id="send-btn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航栏（移动端） -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white shadow-md border-t border-gray-200">
        <div class="flex justify-around">
            <a href="index.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                <span class="text-xs mt-1">首页</span>
            </a>
            <a href="pets.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">我的宠物</span>
            </a>
            <a href="consultation.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">咨询</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>

    <script>
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addMessage('user', message);
            input.value = '';
            
            // 显示AI正在输入
            const typingIndicator = addTypingIndicator();
            
            // 模拟AI回复
            setTimeout(() => {
                // 移除输入指示器
                typingIndicator.remove();
                
                // 添加AI回复
                addMessage('ai', getAIResponse(message));
            }, 1000);
        }

        // 添加消息
        function addMessage(type, content) {
            const chatMessages = document.getElementById('chat-messages');
            const messageDiv = document.createElement('div');
            
            if (type === 'user') {
                messageDiv.className = 'flex items-start justify-end';
                messageDiv.innerHTML = `
                    <div class="bg-blue-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">${content}</p>
                    </div>
                    <div class="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center ml-3 flex-shrink-0">
                        <svg class="w-4 h-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </div>
                `;
            } else {
                messageDiv.className = 'flex items-start';
                messageDiv.innerHTML = `
                    <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3 flex-shrink-0">
                        <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                        </svg>
                    </div>
                    <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                        <p class="text-gray-800">${content}</p>
                    </div>
                `;
            }
            
            chatMessages.appendChild(messageDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // 添加输入指示器
        function addTypingIndicator() {
            const chatMessages = document.getElementById('chat-messages');
            const typingDiv = document.createElement('div');
            typingDiv.className = 'flex items-start';
            typingDiv.innerHTML = `
                <div class="w-8 h-8 bg-blue-100 rounded-full flex items-center justify-center mr-3 flex-shrink-0">
                    <svg class="w-4 h-4 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path>
                    </svg>
                </div>
                <div class="bg-gray-100 rounded-lg p-3 max-w-[80%]">
                    <div class="flex space-x-1">
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                        <div class="w-2 h-2 bg-gray-400 rounded-full animate-bounce" style="animation-delay: 0.4s"></div>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(typingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return typingDiv;
        }

        // 模拟AI回复
        function getAIResponse(message) {
            const responses = {
                '我的金毛最近食欲下降，怎么办？': '金毛食欲下降可能有多种原因，如：1. 健康问题：消化问题、口腔疾病等；2. 饮食问题：食物单一、变质等；3. 环境变化：压力、气候变化等。建议：检查食物是否新鲜，观察宠物是否有其他症状，如果持续不改善，建议咨询兽医。',
                '我的宠物需要接种哪些疫苗？': '宠物需要接种的疫苗包括：1. 核心疫苗：狂犬病疫苗、犬瘟热疫苗、细小病毒疫苗等；2. 非核心疫苗：根据宠物的生活环境和风险因素决定。建议咨询兽医制定个性化的疫苗接种计划。',
                '如何给宠物洗澡？': '给宠物洗澡的步骤：1. 准备好洗澡用品：宠物专用 shampoo、毛巾、吹风机等；2. 调节水温至适宜温度；3. 先湿润宠物的毛发，然后涂抹 shampoo；4. 彻底冲洗干净；5. 用毛巾擦干，然后用吹风机吹干。注意：不要让水进入宠物的眼睛和耳朵。',
                '宠物肥胖怎么办？': '宠物肥胖的解决方法：1. 控制饮食：选择低热量、高纤维的宠物食品；2. 增加运动量：每天适当的散步和玩耍；3. 定期称重：监控体重变化；4. 避免零食和人类食物。如果肥胖严重，建议咨询兽医。'
            };
            
            return responses[message] || '我理解您的问题，关于这个方面，我建议您咨询专业的兽医获取更准确的建议。同时，您可以关注我们的科普文章，了解更多宠物健康知识。';
        }

        // 发送按钮点击事件
        document.getElementById('send-btn').addEventListener('click', sendMessage);

        // 输入框回车事件
        document.getElementById('chat-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });

        // 快捷提问按钮点击事件
        document.querySelectorAll('.bg-white.border.border-gray-200.rounded-full').forEach(button => {
            button.addEventListener('click', function() {
                const question = this.textContent;
                document.getElementById('chat-input').value = question;
                sendMessage();
            });
        });
    </script>
    <!-- 引入主脚本 -->
    <script src="src/js/main.js"></script>
</body>
</html>
