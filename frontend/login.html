<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI宠物健康管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4 py-8">
        <div class="max-w-md mx-auto bg-white rounded-lg shadow-md overflow-hidden">
            <div class="p-6">
                <div class="flex justify-center mb-6">
                    <div class="flex items-center space-x-2">
                        <svg class="w-10 h-10 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                            <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                            <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"></path>
                        </svg>
                        <h1 class="text-2xl font-bold text-gray-800">AI宠物健康管理系统</h1>
                    </div>
                </div>
                
                <div class="mb-6">
                    <div class="flex border-b border-gray-200">
                        <button id="login-tab" class="flex-1 py-3 px-4 text-center font-medium text-blue-600 border-b-2 border-blue-600">登录</button>
                        <button id="register-tab" class="flex-1 py-3 px-4 text-center font-medium text-gray-500 hover:text-gray-700">注册</button>
                    </div>
                </div>
                
                <!-- 登录表单 -->
                <div id="login-form" class="space-y-4">
                    <div>
                        <label for="login-email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input type="email" id="login-email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入邮箱">
                    </div>
                    <div>
                        <label for="login-password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="login-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
                    </div>
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input type="checkbox" id="remember-me" class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300 rounded">
                            <label for="remember-me" class="ml-2 block text-sm text-gray-700">记住我</label>
                        </div>
                        <a href="#" class="text-sm text-blue-600 hover:text-blue-800">忘记密码？</a>
                    </div>
                    <button id="login-btn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">登录</button>
                </div>
                
                <!-- 注册表单 -->
                <div id="register-form" class="space-y-4 hidden">
                    <div>
                        <label for="register-name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <input type="text" id="register-name" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入姓名">
                    </div>
                    <div>
                        <label for="register-email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input type="email" id="register-email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入邮箱">
                    </div>
                    <div>
                        <label for="register-password" class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                        <input type="password" id="register-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请输入密码">
                    </div>
                    <div>
                        <label for="register-confirm-password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <input type="password" id="register-confirm-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="请再次输入密码">
                    </div>
                    <button id="register-btn" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">注册</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const API_BASE_URL = '/api';
        
        // 切换登录注册标签
        document.getElementById('login-tab').addEventListener('click', function() {
            document.getElementById('login-tab').classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
            document.getElementById('login-tab').classList.remove('text-gray-500');
            document.getElementById('register-tab').classList.add('text-gray-500');
            document.getElementById('register-tab').classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        });
        
        document.getElementById('register-tab').addEventListener('click', function() {
            document.getElementById('register-tab').classList.add('text-blue-600', 'border-b-2', 'border-blue-600');
            document.getElementById('register-tab').classList.remove('text-gray-500');
            document.getElementById('login-tab').classList.add('text-gray-500');
            document.getElementById('login-tab').classList.remove('text-blue-600', 'border-b-2', 'border-blue-600');
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
        });
        
        // 登录功能
        document.getElementById('login-btn').addEventListener('click', async function() {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                Swal.fire('提示', '请输入邮箱和密码', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username: email, password })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || '登录失败');
                }
                
                const data = await response.json();
                
                // 保存token和用户信息到localStorage
                localStorage.setItem('jwt_token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                
                Swal.fire({
                    title: '登录成功',
                    text: `欢迎回来，${data.user.name || data.user.username || '用户'}！`,
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    window.location.href = 'index.html';
                });
            } catch (error) {
                console.error('登录错误:', error);
                Swal.fire('登录失败', error.message || '请检查邮箱和密码是否正确', 'error');
            }
        });
        
        // 注册功能
        document.getElementById('register-btn').addEventListener('click', async function() {
            const name = document.getElementById('register-name').value.trim();
            const email = document.getElementById('register-email').value.trim();
            const password = document.getElementById('register-password').value;
            const confirmPassword = document.getElementById('register-confirm-password').value;
            
            if (!name || !email || !password || !confirmPassword) {
                Swal.fire('提示', '请填写所有字段', 'warning');
                return;
            }
            
            if (password !== confirmPassword) {
                Swal.fire('提示', '两次输入的密码不一致', 'warning');
                return;
            }
            
            if (password.length < 6) {
                Swal.fire('提示', '密码长度至少为6位', 'warning');
                return;
            }
            
            try {
                const response = await fetch(`${API_BASE_URL}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        name, 
                        username: email.split('@')[0] + Math.floor(Math.random() * 1000), 
                        email, 
                        password 
                    })
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(errorText || '注册失败');
                }
                
                const data = await response.json();
                
                Swal.fire({
                    title: '注册成功',
                    text: '请使用新账号登录',
                    icon: 'success',
                    timer: 1500,
                    showConfirmButton: false
                }).then(() => {
                    // 切换到登录标签
                    document.getElementById('login-tab').click();
                    // 填充登录表单
                    document.getElementById('login-email').value = email;
                    document.getElementById('login-password').value = '';
                });
            } catch (error) {
                console.error('注册错误:', error);
                Swal.fire('注册失败', error.message || '该邮箱可能已被注册', 'error');
            }
        });
        
        // 回车键提交
        document.getElementById('login-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('login-btn').click();
            }
        });
        
        document.getElementById('register-confirm-password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('register-btn').click();
            }
        });
    </script>
</body>
</html>
