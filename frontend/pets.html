<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的宠物 - AI宠物健康管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-gray-50">
    <!-- 顶部导航栏 -->
    <header class="bg-white shadow-md">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <svg class="w-8 h-8 text-blue-600" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"></path>
                </svg>
                <h1 class="text-xl font-bold text-gray-800">AI宠物健康管理系统</h1>
            </div>
            <nav class="hidden md:flex space-x-6">
                <a href="index.html" class="text-gray-700 hover:text-blue-600 font-medium">首页</a>
                <a href="pets.html" class="text-blue-600 hover:text-blue-800 font-medium">我的宠物</a>
                <a href="consultation.html" class="text-gray-700 hover:text-blue-600 font-medium">咨询</a>
                <a href="profile.html" class="text-gray-700 hover:text-blue-600 font-medium">我的</a>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="hidden md:block bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">添加宠物</button>
                <button class="md:hidden text-gray-700">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">我的宠物</h2>
            <button id="add-pet-btn" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 transition">
                <svg class="w-5 h-5 inline mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                添加宠物
            </button>
        </div>

        <!-- 宠物列表 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- 宠物卡片 1 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="relative h-48">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20golden%20retriever%20dog&image_size=landscape_4_3" alt="金毛" class="w-full h-full object-cover">
                    <div class="absolute top-4 right-4 flex space-x-2">
                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                            </svg>
                        </button>
                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-semibold text-gray-800">小金</h3>
                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">金毛</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-4">
                        <div>年龄：2岁</div>
                        <div>体重：15kg</div>
                        <div>性别：公</div>
                        <div>疫苗：已完成</div>
                    </div>
                    <div class="flex space-x-2">
                        <button class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition text-sm">查看详情</button>
                        <button class="flex-1 bg-gray-200 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-300 transition text-sm">健康记录</button>
                    </div>
                </div>
            </div>

            <!-- 宠物卡片 2 -->
            <div class="bg-white rounded-lg shadow overflow-hidden">
                <div class="relative h-48">
                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20persian%20cat&image_size=landscape_4_3" alt="波斯猫" class="w-full h-full object-cover">
                    <div class="absolute top-4 right-4 flex space-x-2">
                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                            </svg>
                        </button>
                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="p-4">
                    <div class="flex justify-between items-center mb-2">
                        <h3 class="text-lg font-semibold text-gray-800">小白</h3>
                        <span class="bg-purple-100 text-purple-800 text-xs px-2 py-1 rounded">波斯猫</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-4">
                        <div>年龄：1岁</div>
                        <div>体重：4kg</div>
                        <div>性别：母</div>
                        <div>疫苗：已完成</div>
                    </div>
                    <div class="flex space-x-2">
                        <button class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition text-sm">查看详情</button>
                        <button class="flex-1 bg-gray-200 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-300 transition text-sm">健康记录</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 底部导航栏（移动端） -->
    <nav class="md:hidden fixed bottom-0 left-0 right-0 bg-white shadow-md border-t border-gray-200">
        <div class="flex justify-around">
            <a href="index.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
                </svg>
                <span class="text-xs mt-1">首页</span>
            </a>
            <a href="pets.html" class="flex flex-col items-center py-2 px-4 text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path d="M10 12a2 2 0 100-4 2 2 0 000 4z"></path>
                    <path fill-rule="evenodd" d="M.458 10C1.732 5.943 5.522 3 10 3s8.268 2.943 9.542 7c-1.274 4.057-5.064 7-9.542 7S1.732 14.057.458 10zM14 10a4 4 0 11-8 0 4 4 0 018 0z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">我的宠物</span>
            </a>
            <a href="consultation.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-8-3a1 1 0 00-.867.5 1 1 0 11-1.731-1A3 3 0 0113 8a3.001 3.001 0 01-2 2.83V11a1 1 0 11-2 0v-1a1 1 0 011-1 1 1 0 100-2zm0 8a1 1 0 100-2 1 1 0 000 2z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">咨询</span>
            </a>
            <a href="profile.html" class="flex flex-col items-center py-2 px-4 text-gray-500 hover:text-blue-600">
                <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"></path>
                </svg>
                <span class="text-xs mt-1">我的</span>
            </a>
        </div>
    </nav>

    <!-- 添加宠物模态框 -->
    <div id="add-pet-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800">添加宠物</h3>
                    <button id="close-modal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <form id="add-pet-form" class="space-y-4">
                    <div>
                        <label for="pet-name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>
                        <input type="text" id="pet-name" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="pet-breed" class="block text-sm font-medium text-gray-700 mb-1">品种</label>
                        <input type="text" id="pet-breed" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="pet-age" class="block text-sm font-medium text-gray-700 mb-1">年龄</label>
                        <input type="number" id="pet-age" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="pet-weight" class="block text-sm font-medium text-gray-700 mb-1">体重 (kg)</label>
                        <input type="number" id="pet-weight" step="0.1" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="pet-gender" class="block text-sm font-medium text-gray-700 mb-1">性别</label>
                        <select id="pet-gender" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="male">公</option>
                            <option value="female">母</option>
                        </select>
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">添加宠物</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 打开添加宠物模态框
        document.getElementById('add-pet-btn').addEventListener('click', function() {
            document.getElementById('add-pet-modal').classList.remove('hidden');
        });

        // 关闭添加宠物模态框
        document.getElementById('close-modal').addEventListener('click', function() {
            document.getElementById('add-pet-modal').classList.add('hidden');
        });

        // 点击模态框外部关闭
        document.getElementById('add-pet-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // 添加宠物表单提交
        document.getElementById('add-pet-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const name = document.getElementById('pet-name').value;
            const breed = document.getElementById('pet-breed').value;
            const age = document.getElementById('pet-age').value;
            const weight = document.getElementById('pet-weight').value;
            const gender = document.getElementById('pet-gender').value;
            
            if (!name || !breed || !age || !weight) {
                Swal.fire('提示', '请填写所有必填字段', 'warning');
                return;
            }
            
            // 模拟添加宠物请求
            fetch('http://localhost:8080/api/pets', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                },
                body: JSON.stringify({ name, breed, age, weight, gender })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    Swal.fire('成功', '宠物添加成功', 'success').then(() => {
                        window.location.reload();
                    });
                } else {
                    Swal.fire('错误', data.message, 'error');
                }
            })
            .catch(error => {
                Swal.fire('错误', '添加失败，请稍后重试', 'error');
            });
        });

        // 加载宠物列表
        function loadPets() {
            fetch('http://localhost:8080/api/pets', {
                headers: {
                    'Authorization': 'Bearer ' + localStorage.getItem('token')
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // 渲染宠物列表
                    const petsContainer = document.querySelector('.grid');
                    petsContainer.innerHTML = '';
                    
                    data.data.forEach(pet => {
                        const petCard = `
                            <div class="bg-white rounded-lg shadow overflow-hidden">
                                <div class="relative h-48">
                                    <img src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=cute%20${pet.breed}&image_size=landscape_4_3" alt="${pet.name}" class="w-full h-full object-cover">
                                    <div class="absolute top-4 right-4 flex space-x-2">
                                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path>
                                            </svg>
                                        </button>
                                        <button class="bg-white/80 hover:bg-white rounded-full p-2">
                                            <svg class="w-5 h-5 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                                            </svg>
                                        </button>
                                    </div>
                                </div>
                                <div class="p-4">
                                    <div class="flex justify-between items-center mb-2">
                                        <h3 class="text-lg font-semibold text-gray-800">${pet.name}</h3>
                                        <span class="bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">${pet.breed}</span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2 text-sm text-gray-600 mb-4">
                                        <div>年龄：${pet.age}岁</div>
                                        <div>体重：${pet.weight}kg</div>
                                        <div>性别：${pet.gender === 'male' ? '公' : '母'}</div>
                                        <div>疫苗：已完成</div>
                                    </div>
                                    <div class="flex space-x-2">
                                        <button class="flex-1 bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition text-sm">查看详情</button>
                                        <button class="flex-1 bg-gray-200 text-gray-700 py-2 px-4 rounded-md hover:bg-gray-300 transition text-sm">健康记录</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        petsContainer.innerHTML += petCard;
                    });
                }
            })
            .catch(error => {
                console.error('加载宠物列表失败:', error);
            });
        }

        // 页面加载时加载宠物列表
        window.addEventListener('load', loadPets);
    </script>
</body>
</html>
