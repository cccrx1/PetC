    <!-- 编辑资料模态框 -->
    <div id="edit-profile-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">

                    <button id="close-edit-modal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">

                    </button>
                </div>
                <form id="edit-profile-form" class="space-y-4">
                    <div>
                        <label for="edit-name" class="block text-sm font-medium text-gray-700 mb-1">姓名</label>

                    <div>
                        <label for="edit-email" class="block text-sm font-medium text-gray-700 mb-1">邮箱</label>
                        <input type="email" id="edit-email" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" value="zhangsan@example.com">
                    </div>

    <!-- 修改密码模态框 -->
    <div id="change-password-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-lg shadow-xl max-w-md w-full mx-4">
            <div class="p-6">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-xl font-bold text-gray-800">修改密码</h3>
                    <button id="close-password-modal" class="text-gray-500 hover:text-gray-700">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <form id="change-password-form" class="space-y-4">
                    <div>
                        <label for="current-password" class="block text-sm font-medium text-gray-700 mb-1">当前密码</label>
                        <input type="password" id="current-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="new-password" class="block text-sm font-medium text-gray-700 mb-1">新密码</label>
                        <input type="password" id="new-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-gray-700 mb-1">确认密码</label>
                        <input type="password" id="confirm-password" class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div class="pt-2">
                        <button type="submit" class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 transition">保存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 加载用户信息
        function loadUserProfile() {
            const user = window.auth.getUser();
            if (user) {
                document.getElementById('user-name').textContent = user.name || user.username;
                document.getElementById('user-email').textContent = user.email;
                document.getElementById('edit-name').value = user.name || user.username;
                document.getElementById('edit-email').value = user.email;
            } else {
                // 尝试从API获取用户信息
                window.auth.apiRequest('/auth/profile')
                    .then(userData => {
                        document.getElementById('user-name').textContent = userData.name || userData.username;
                        document.getElementById('user-email').textContent = userData.email;
                        document.getElementById('edit-name').value = userData.name || userData.username;
                        document.getElementById('edit-email').value = userData.email;
                        // 更新本地存储的用户信息
                        window.auth.setUser(userData);
                    })
                    .catch(error => {
                        console.error('加载用户信息失败:', error);
                        document.getElementById('user-name').textContent = '未登录';
                        document.getElementById('user-email').textContent = '';
                    });
            }
        }

        // 打开编辑资料模态框
        document.getElementById('edit-profile-btn').addEventListener('click', function() {
            document.getElementById('edit-profile-modal').classList.remove('hidden');
        });

        // 关闭编辑资料模态框
        document.getElementById('close-edit-modal').addEventListener('click', function() {
            document.getElementById('edit-profile-modal').classList.add('hidden');
        });

        // 点击编辑资料模态框外部关闭
        document.getElementById('edit-profile-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // 打开修改密码模态框
        document.getElementById('change-password-btn').addEventListener('click', function() {
            document.getElementById('change-password-modal').classList.remove('hidden');
        });

        // 关闭修改密码模态框
        document.getElementById('close-password-modal').addEventListener('click', function() {
            document.getElementById('change-password-modal').classList.add('hidden');
        });

        // 点击修改密码模态框外部关闭
        document.getElementById('change-password-modal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // 编辑资料表单提交
        document.getElementById('edit-profile-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const name = document.getElementById('edit-name').value;
            const email = document.getElementById('edit-email').value;
            
            if (!name || !email) {
                Swal.fire('提示', '请填写所有字段', 'warning');
                return;
            }
            
            try {
                const updatedUser = await window.auth.apiRequest('/auth/profile', {
                    method: 'PUT',
                    body: JSON.stringify({ name, email })
                });
                
                Swal.fire('成功', '资料更新成功', 'success').then(() => {
                    document.getElementById('edit-profile-modal').classList.add('hidden');
                    // 更新本地存储的用户信息
                    window.auth.setUser(updatedUser);
                    // 重新加载用户信息
                    loadUserProfile();
                });
            } catch (error) {
                Swal.fire('错误', '更新失败，请稍后重试', 'error');
            }
        });

        // 修改密码表单提交
        document.getElementById('change-password-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const currentPassword = document.getElementById('current-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                Swal.fire('提示', '请填写所有字段', 'warning');
                return;
            }
            
            if (newPassword !== confirmPassword) {
                Swal.fire('提示', '两次输入的密码不一致', 'warning');
                return;
            }
            
            try {
                console.log('开始修改密码');
                console.log('当前密码:', currentPassword);
                console.log('新密码:', newPassword);
                
                const response = await window.auth.apiRequest('/auth/password', {
                    method: 'PUT',
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                
                console.log('修改密码成功:', response);
                
                Swal.fire('成功', '密码修改成功', 'success').then(() => {
                    document.getElementById('change-password-modal').classList.add('hidden');
                    // 清空表单
                    document.getElementById('current-password').value = '';
                    document.getElementById('new-password').value = '';
                    document.getElementById('confirm-password').value = '';
                });
            } catch (error) {
                console.error('修改密码失败:', error);
                Swal.fire('错误', '修改失败，请稍后重试', 'error');
            }
        });

        // 退出登录
        document.getElementById('logout-btn').addEventListener('click', function() {
            Swal.fire({
                title: '确认退出',
                text: '确定要退出登录吗？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '确定',
                cancelButtonText: '取消'
            }).then((result) => {
                if (result.isConfirmed) {
                    // 调用退出登录函数
                    window.auth.logout();
                }
            });
        });

        // 页面加载时加载用户信息
        window.addEventListener('load', loadUserProfile);
    </script>
    <!-- 引入主脚本 -->
    <script src="src/js/main.js"></script>
</body>
